<!doctype html>
<head>
  <meta charset="utf-8">
  <title>Zig WebUI Angular App</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="description" content="Angular app with Zig backend via WebUI WebSocket bridge">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    app-root {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Loading state */
    app-root:empty::after {
      content: 'Loading...';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      font-size: 18px;
      color: #666;
    }
    /* WebUI connection error */
    #webui-connection-error {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px;
      text-align: center;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 9999;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #webui-connection-error.visible {
      display: block;
    }
    #webui-connection-error strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="webui-connection-error">
    <strong>Connecting to backend...</strong> Using WebUI WebSocket bridge
  </div>
  <app-root></app-root>
</body>
</html>
