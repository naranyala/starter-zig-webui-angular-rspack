  <style>
    html, body {

      height: 100%;

    }
    app-root {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Loading state */
    app-root:empty::after {
      content: 'Loading...';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      font-size: 18px;
      color: #666;
    }
    /* WebUI connection error */
    #webui-connection-error {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px;
      text-align: center;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 9999;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #webui-connection-error.visible {
      display: block;
    }
    #webui-connection-error strong {
      font-weight: 600;
    }
  </style>
</head>
